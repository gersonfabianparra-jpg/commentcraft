<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Burbuja principal (grande) -->
  <rect x="8" y="10" width="72" height="52" rx="16" fill="url(#grad1)" />
  <!-- Cola burbuja principal -->
  <polygon points="20,58 14,74 38,58" fill="url(#grad1)" />

  <!-- Burbuja secundaria (pequeña) -->
  <rect x="44" y="52" width="58" height="42" rx="14" fill="url(#grad2)" />
  <!-- Cola burbuja secundaria -->
  <polygon points="90,90 96,108 76,90" fill="url(#grad2)" />

  <!-- Puntos decorativos en burbuja grande -->
  <circle cx="28" cy="36" r="5" fill="white" opacity="0.9"/>
  <circle cx="44" cy="36" r="5" fill="white" opacity="0.9"/>
  <circle cx="60" cy="36" r="5" fill="white" opacity="0.9"/>

  <!-- Estrella en burbuja pequeña -->
  <text x="73" y="81" font-size="22" fill="white" text-anchor="middle" font-family="system-ui">✦</text>
</svg>
